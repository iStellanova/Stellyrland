lcd = { lcd = { mode = "temp", brightness = 50, orientation = 270, colors = [], temp_source = { temp_name = "temp1", device_uid = "c1c4f573af5adb37f4b2b21c38e7ab00131dec4e073a10af87799b5e930fee88" } } }
pump = { speed_fixed = 100 }
fan = { speed_fixed = 100 }

