# tack pins. generated by flake-file write-tack.
# nix reads pins.lock.json; this file drives tack update

[all_follow]
nixpkgs = "nixpkgs"

[inputs.cachyos-kernel]
url = "github:xddxdd/nix-cachyos-kernel/release"
exclude_follow = ["nixpkgs"]

[inputs.catppuccin]
url = "github:catppuccin/nix"

[inputs.darwin]
url = "github:LnL7/nix-darwin"

[inputs.den]
url = "github:denful/den"

[inputs.disko]
url = "github:nix-community/disko"

[inputs.flake-file]
url = "github:vic/flake-file"

[inputs.flake-parts]
url = "github:hercules-ci/flake-parts"

[inputs.home-manager]
url = "github:nix-community/home-manager/master"

[inputs.hyprland]
url = "github:hyprwm/Hyprland"
exclude_follow = ["nixpkgs"]

[inputs.hyprsplit]
url = "github:shezdy/hyprsplit"

[inputs.import-tree]
url = "github:vic/import-tree"

[inputs.lanzaboote]
url = "github:nix-community/lanzaboote"

[inputs.lix-module]
url = "git+https://git.lix.systems/lix-project/nixos-module"

[inputs.llm-agents]
url = "github:numtide/llm-agents.nix"

[inputs.mac-app-util]
url = "github:hraban/mac-app-util"

[inputs.my-assets]
url = "github:iStellanova/Stellyrland/assets"
type = "fetch"

[inputs.nix-flatpak]
url = "github:gmodena/nix-flatpak"

[inputs.nix-index-database]
url = "github:nix-community/nix-index-database"

[inputs.nixpkgs]
url = "github:nixos/nixpkgs/nixos-unstable-small"

[inputs.noctalia-greeter]
url = "github:noctalia-dev/noctalia-greeter"

[inputs.noctalia-shell]
url = "github:noctalia-dev/noctalia/cachix"
exclude_follow = ["nixpkgs"]

[inputs.preservation]
url = "github:nix-community/preservation"

[inputs.sops-nix]
url = "github:Mic92/sops-nix"

[inputs.tack]
url = "github:manic-systems/tack"

[inputs.treefmt-nix]
url = "github:numtide/treefmt-nix"

[inputs.zen-browser]
url = "github:youwen5/zen-browser-flake"
exclude_follow = ["nixpkgs"]
