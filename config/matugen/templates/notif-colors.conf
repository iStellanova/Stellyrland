# Matugen-generated dunst colors
# Generated by matugen — do not edit directly
# Input: ~/.config/matugen/templates/dunst-colors.conf
# Output: ~/.config/dunst/dunstrc

[global]
    ### Display ###
    monitor = 1
    follow = none

    ### Geometry ###
    width = 370
    height = (0, 200)
    origin = top-right
    offset = (20, 10)
    scale = 0
    notification_limit = 5

    ### Appearance ###
    transparency = 0
    separator_height = 2
    padding = 15
    horizontal_padding = 15
    text_icon_padding = 15
    frame_width = 2
    frame_color = "#{{colors.primary.default.hex_stripped}}cc"
    gap_size = 10
    separator_color = frame
    sort = yes
    corner_radius = 14
    corners = all

    ### Icons ###
    icon_theme = "hicolor"
    enable_recursive_icon_lookup = true
    icon_position = left
    min_icon_size = 48
    max_icon_size = 48

    ### Text ###
    font = Sans 12
    line_height = 0
    markup = full
    format = "<b>%s</b>\n%b"
    alignment = left
    vertical_alignment = center
    show_age_threshold = 60
    ellipsize = middle
    ignore_newline = no
    stack_duplicates = true
    hide_duplicate_count = false
    show_indicators = yes
    word_wrap = yes

    ### Mouse ###
    mouse_left_click = do_action, close_current
    mouse_middle_click = close_all
    mouse_right_click = close_current

    ### Misc ###
    dmenu = /usr/bin/dmenu -p dunst:
    browser = /usr/bin/xdg-open
    always_run_script = true
    title = Dunst
    class = Dunst
    ignore_dbusclose = false
    force_xwayland = false
    force_xinerama = false
    sticky_history = yes
    history_length = 20
    script = /home/stellanova/.config/eww/scripts/dunst_logger.sh

[urgency_low]
    background = "{{colors.background.default.hex}}a6"
    foreground = "#{{colors.on_surface.default.hex_stripped}}"
    frame_color = "#{{colors.primary.default.hex_stripped}}cc"
    timeout = 5
    default_icon = dialog-information

[urgency_normal]
    background = "{{colors.background.default.hex}}a6"
    foreground = "#{{colors.on_surface.default.hex_stripped}}"
    frame_color = "#{{colors.primary.default.hex_stripped}}cc"
    timeout = 5

[urgency_critical]
    background = "{{colors.background.default.hex}}a6"
    foreground = "#{{colors.on_surface.default.hex_stripped}}"
    frame_color = "#{{colors.primary.default.hex_stripped}}cc"
    timeout = 0
