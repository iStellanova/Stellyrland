##############################
### WINDOWS AND WORKSPACES ###
##############################

###################
###    FLOAT    ###
###################

windowrule = float on, match:class ^(Rofi)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:class ^(zenity)$
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = float on, match:title ^(File Operation Progress)$
windowrule = float on, match:title ^(Open File)$
windowrule = float on, match:title ^(Open Folder)$
windowrule = float on, match:title ^(Picture in picture)$
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(org\.quickshell)$

###################
###    CENTER   ###
###################

windowrule = center on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = center on, match:class ^(zenity)$
windowrule = center on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = center on, match:title ^(Open File)$
windowrule = center on, match:title ^(Open Folder)$
windowrule = center on, match:class ^(org\.quickshell)$
windowrule = stay_focused on, match:class ^(org\.quickshell)$

###################
###	    SIZE    ###
###################

windowrule = size 70% 70%, match:title ^(Select a Wallpaper)$
windowrule = size 32% 18%, match:title ^(Picture-in-Picture)$
windowrule = size 70% 50%, match:class ^(xdg-desktop-portal-gtk)$

###################
###  POSITION   ###
###################

windowrule = move 45% 30%, match:title ^(Confirm File Replacing)$
windowrule = move 18% 35%, match:title ^(Copying files)$
windowrule = move 18% 35%, match:title ^(Moving files)$
windowrule = float on, match:class ^(waypaper)$
windowrule = center on, match:class ^(waypaper)$
windowrule = size 70% 70%, match:class ^(waypaper)$
windowrule = pin on, match:class ^(waypaper)$

windowrule = pin on, match:title ^(Select a Wallpaper)$

###################
###   OPACITY   ###
###################

windowrule = opacity 1.0 override,                          match:class ^(xdg-desktop-portal-gtk)$
windowrule = opacity 1.0 override,                          match:class ^(Xdg-desktop-portal-gtk)$
windowrule = opacity 0.85 override 0.75 override,           match:class ^(org.gnome.Nautilus)$
windowrule = opacity 0.8 override 0.8 override 1.0 override, match:class ^(kitty)$
windowrule = opacity 0.3 override,                          match:class ^(nvim)$
windowrule = opacity 1.0 override 0.85 override 1.0 override, match:class ^(zen)$
windowrule = opacity 1.0 override 1.0 override,             match:class ^(discord)$
windowrule = opacity 1.0 override 1.0 override,             match:class ^(vesktop)$
windowrule = opacity 1.0 override,                          match:title ^(Picture in picture)$
windowrule = opacity 0.6 override 0.6 override 1.0 override, match:title (.*)(YouTube Music)(.*)

###################
### SHADOW/BLUR ###
###################

windowrule = no_shadow on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = no_blur on,   match:class ^(xdg-desktop-portal-gtk)$
windowrule = no_blur on,   match:title ^(Picture in picture)$
windowrule = no_shadow on, match:title ^(Picture in picture)$

###################
### ANIMATIONS  ###
###################

windowrule = animation popin override, match:class ^(rofi)$

##############################
###		 LAYER RULES       ###
##############################

###################
###    BLUR     ###
###################

layerrule = blur on, match:namespace quickshell
layerrule = blur on, match:namespace notifications
layerrule = blur on, match:namespace quickshell-tray
layerrule = blur on, match:namespace quickshell-popups

###################
###    ALPHA    ###
###################

layerrule = ignore_alpha 0.05, match:namespace notifications
layerrule = ignore_alpha 0.05, match:namespace quickshell
layerrule = ignore_alpha 0.05, match:namespace quickshell-tray
layerrule = ignore_alpha 0.0, match:namespace quickshell-popups

###################
### ANIMATIONS  ###
###################

layerrule = animation slide,                     match:namespace notifications
layerrule = animation slide,                     match:namespace quickshell
layerrule = no_anim on,                          match:namespace quickshell-popups
layerrule = no_anim on,                          match:namespace quickshell-tray