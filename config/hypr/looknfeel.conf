#####################
### LOOK AND FEEL ###
#####################

# https://wiki.hyprland.org/Configuring/Variables/

source = ~/.config/hypr/colors.conf

####################
###    GENERAL   ###
####################

# https://wiki.hyprland.org/Configuring/Variables/#general

general {
    gaps_in = 8
    gaps_out = 12
    border_size = 3

    col.active_border = $on_background
    col.inactive_border = $background

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

####################
###  DECORATION  ###
####################

# https://wiki.hyprland.org/Configuring/Variables/#decoration

decoration {
    rounding = 12
    active_opacity = 0.8
    inactive_opacity = 0.8
    fullscreen_opacity = 1.0

    shadow {
        range = 10
        render_power = 4
        sharp = false
        color = $primary_container
        color_inactive = rgba(0,0,0,0)
    }

    blur {
        enabled = true
        size = 12
        passes = 3
        noise = 0
        brightness = 0.9
        contrast = 1.25
        vibrancy = 1
        xray = false
        new_optimizations = true
        popups = true
        popups_ignorealpha = 0.1
        special = false
    }
}

####################
###  ANIMATIONS  ###
####################

# https://wiki.hyprland.org/Configuring/Animations/

animations {
    enabled = true

    # Bezier curves
    bezier = md3_decel,     0.05, 0.7,  0.1,  1
    bezier = md3_accel,     0.3,  0,    0.8,  0.15
    bezier = hyprnostretch, 0.05, 0.9,  0.1,  1.0
    bezier = menu_decel,    0.1,  1,    0,    1
    bezier = menu_accel,    0.38, 0.04, 1,    0.07
    bezier = easeOutExpo,   0.16, 1,    0.3,  1
    bezier = softAcDecel,   0.26, 0.26, 0.15, 1

    # Windows
    animation = windows,    1, 3,   md3_decel,     popin 60%
    animation = windowsIn,  1, 3,   hyprnostretch, popin 40%
    animation = windowsOut, 1, 3,   md3_accel,     popin 60%

    # Fading
    animation = fade,         1, 3,   md3_decel

    # Layers
    animation = layersIn,     1, 3,   menu_decel, popin
    animation = layersOut,    1, 1.6, menu_accel
    animation = fadeLayersIn, 1, 2,   menu_decel

    # Workspaces
    animation = workspaces,       1, 5, easeOutExpo, slidefade 50%
    animation = specialWorkspace, 1, 3, md3_decel,   slidefadevert 15%

    # Borders
    animation = border,      1, 10,  default
    animation = borderangle, 1, 100, softAcDecel, once
}

####################
###    CURSOR    ###
####################

cursor {
    sync_gsettings_theme = true
    warp_on_change_workspace = false
    no_hardware_cursors = true
}

####################
###    LAYOUT    ###
####################

# https://wiki.hyprland.org/Configuring/Dwindle-Layout/

dwindle {
    pseudotile = true
    preserve_split = true
}

####################
###     MISC     ###
####################

# https://wiki.hyprland.org/Configuring/Variables/#misc

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}