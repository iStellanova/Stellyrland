####################
### KEYBINDINGS  ###
####################

# https://wiki.hyprland.org/Configuring/Keywords/

$mainMod    = SUPER
$terminal   = kitty
$fileManager = nautilus
$menu       = quickshell ipc call shell toggleLauncher
$scripts    = ~/.config/hypr/Scripts

# --------------------------------------------------------------------------- #

###################
### APPS        ###
###################

bind = $mainMod, Q,          exec, $terminal
bind = $mainMod, E,          exec, $fileManager --new-window
bind = $mainMod, B,          exec, zen-browser
bind = $mainMod, Space,      exec, $menu
bind = $mainMod, Tab,        exec, quickshell ipc call shell toggleWallpaperSelector

###################
### SESSION     ###
###################

bind = $mainMod+Shift, L,         exec, hyprlock
bind = $mainMod+Shift, X,         exec, quickshell ipc call shell toggleLogout

###################
### WINDOWS     ###
###################

bind  = $mainMod,       C,      killactive
bind  = Alt,            F4,     killactive
bind  = $mainMod,       A,      togglefloating
bind  = $mainMod,       P,      pseudo
bind  = $mainMod,       O,      togglesplit
bind  = Alt,            Return, fullscreen
bind  = $mainMod,       G,      movetoworkspace, +0

# Move focus (vim + arrow keys)
bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d
bind = $mainMod+CTRL, left,  movefocus, l
bind = $mainMod+CTRL, right, movefocus, r
bind = $mainMod+CTRL, up,    movefocus, u
bind = $mainMod+CTRL, down,  movefocus, d

# Resize windows
binde = $mainMod+Alt, right, resizeactive,  50 0
binde = $mainMod+Alt, left,  resizeactive, -50 0
binde = $mainMod+Alt, up,    resizeactive,  0 -50
binde = $mainMod+Alt, down,  resizeactive,  0 50

# Move windows within workspace
binded = $mainMod+SHIFT+CTRL, left,  Move window left,  exec, $moveactivewindow -30 0  || hyprctl dispatch movewindow l
binded = $mainMod+SHIFT+CTRL, right, Move window right, exec, $moveactivewindow  30 0  || hyprctl dispatch movewindow r
binded = $mainMod+SHIFT+CTRL, up,    Move window up,    exec, $moveactivewindow   0 -30 || hyprctl dispatch movewindow u
binded = $mainMod+SHIFT+CTRL, down,  Move window down,  exec, $moveactivewindow   0 30  || hyprctl dispatch movewindow d

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

###################
### WORKSPACES  ###
###################

# Switch workspaces
bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5
bind = $mainMod, code:15, workspace, 6
bind = $mainMod, code:16, workspace, 7
bind = $mainMod, code:17, workspace, 8
bind = $mainMod, code:18, workspace, 9
bind = $mainMod, code:19, workspace, 10
bind = $mainMod, code:20, workspace, 11
bind = $mainMod, code:21, workspace, 12

# Move window to workspace
bind = $mainMod+SHIFT, 1,        movetoworkspace, 1
bind = $mainMod+SHIFT, 2,        movetoworkspace, 2
bind = $mainMod+SHIFT, 3,        movetoworkspace, 3
bind = $mainMod+SHIFT, 4,        movetoworkspace, 4
bind = $mainMod+SHIFT, 5,        movetoworkspace, 5
bind = $mainMod+SHIFT, 6,        movetoworkspace, 6
bind = $mainMod+SHIFT, 7,        movetoworkspace, 7
bind = $mainMod+SHIFT, 8,        movetoworkspace, 8
bind = $mainMod+SHIFT, 9,        movetoworkspace, 9
bind = $mainMod+SHIFT, 0,        movetoworkspace, 10
bind = $mainMod+SHIFT, code:20,  movetoworkspace, 11
bind = $mainMod+SHIFT, code:21,  movetoworkspace, 12

# Move window to adjacent workspace
bind = $mainMod+SHIFT, left,        movetoworkspace, r-1
bind = $mainMod+SHIFT, right,       movetoworkspace, r+1
bind = $mainMod+SHIFT, semicolon,   movetoworkspace, r-1
bind = $mainMod+SHIFT, apostrophe,  movetoworkspace, r+1

# Navigate workspaces
bind = $mainMod, left,        workspace, -1
bind = $mainMod, right,       workspace, +1
bind = $mainMod, Z, 	 	  workspace, -1
bind = $mainMod, X, 		  workspace, +1bind = $mainMod, bracketleft,  workspace, -1
bind = $mainMod, bracketright, workspace, +1
bind = $mainMod, up,          workspace, e+1
bind = $mainMod, down,        workspace, empty
bind = $mainMod, grave,       workspace, empty
bind = $mainMod, mouse_down,  workspace, e+1
bind = $mainMod, mouse_up,    workspace, e-1

# Special workspaces
bind = $mainMod,       S,     swapnext
bind = $mainMod+SHIFT, S,     movetoworkspace,       special:magic
bind = $mainMod,       F,     movetoworkspacesilent, special:minimized
bind = $mainMod,       R,     togglespecialworkspace, minimized

# Overview
# bind = $mainMod, SPACE, hyprexpo:expo, toggle

###################
### MEDIA       ###
###################



###################
### SCREENSHOTS ###
###################

bind = ,     Print, exec, hyprshot -m region -o ~/Pictures/Screenshots
bind = Shift, Print, exec, hyprshot -m output -o ~/Pictures/Screenshots

###################
### ALT-TAB     ###
###################

bind = ALT+SHIFT, Tab, cyclenext, prev
bind = ALT+SHIFT, Tab, bringactivetotop

